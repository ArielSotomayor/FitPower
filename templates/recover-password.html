<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>FitPower - Recover Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Gym, Fitness, Workout, Training">
    <meta name="description" content="FitPower - Plataforma moderna de entrenamiento y fitness">
    
    <!-- Favicon -->
    <link rel="icon" href="/static/img/favicon.ico">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">
    <link rel="stylesheet" href="/static/lib/flaticon/font/flaticon.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.min.css">
    
    <!-- Animaciones -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js" defer></script>
    
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background-image: url('/static/img/carousel-1.jpg'); /* Mismo fondo oscuro de gimnasio */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Oswald', sans-serif;
            position: relative;
            min-height: 100vh;
        }

        /* Capa oscura sobre el fondo */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* Estilo del contenedor del formulario */
        .form-container {
            background: rgba(29, 29, 29, 0.95);
            border: 2px solid #e53935; /* Borde Rojo */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            margin: auto;
            position: relative;
            overflow: hidden;
        }

        /* Encabezado decorativo - ESCALA DE ROJOS */
        .form-header {
            background: linear-gradient(135deg, #b71c1c, #e53935); /* Degradado Rojo */
            padding: 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: 20px;
        }

        .form-header h2 {
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Inputs personalizados */
        .custom-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .custom-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #e53935; /* Bordes rojos al enfocar */
            color: #fff;
            box-shadow: 0 0 10px rgba(229, 57, 53, 0.3);
        }

        .custom-input::placeholder {
            color: #aaa;
        }

        /* Botón principal - ESCALA DE ROJOS */
        .btn-submit {
            background: linear-gradient(to right, #b71c1c, #e53935); /* Degradado Rojo */
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.3s, box-shadow 0.3s;
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 57, 53, 0.4);
            background: linear-gradient(to right, #e53935, #b71c1c);
            color: #fff;
        }

        /* Icono decorativo */
        .lock-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
            position: absolute;
            right: -20px;
            bottom: -20px;
            transform: rotate(-15deg);
        }

        /* Ajustes de color para texto primario */
        .text-primary {
            color: #e53935 !important;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    
    <!-- Navbar Start -->
    <div class="container-fluid p-0 nav-bar">
        <nav class="navbar navbar-expand-lg navbar-dark py-3">
            <a href="/" class="navbar-brand">
                <h1 class="m-0 display-4 font-weight-bold text-uppercase text-white">FitPower</h1>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                <div class="navbar-nav ml-auto p-2">
                    <a href="/" class="nav-item nav-link">Home</a>
                    <a href="/login" class="nav-item nav-link">Login</a>
                </div>
            </div>
        </nav>
    </div>
    <!-- Navbar End -->

    <!-- Main Content -->
    <div class="container my-5 py-5 d-flex align-items-center justify-content-center flex-grow-1">
        <div class="form-container" data-aos="zoom-in" data-aos-duration="800">
            
            <!-- Icono de fondo decorativo -->
            <i class="fas fa-key lock-icon"></i> <!-- Icono de llave para recuperación -->

            <div class="form-header">
                <h2><i class="fas fa-unlock-alt mr-2"></i> Recover Password</h2>
            </div>

            <div class="p-5 pt-0">
                <p class="text-light mb-4 text-center" style="opacity: 0.8;">
                    Enter your email address below. We will send you a code to reset your password.
                </p>

                <div class="form-group mb-4">
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-0 text-primary"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="email" placeholder="Enter your email" class="form-control custom-input rounded-0">
                    </div>
                </div>

                <button onclick="sendCode()" class="btn btn-block btn-submit w-100">
                    Send Code
                </button>
            </div>
        </div>
    </div>
    <!-- Main Content End -->

    <!-- Footer Start -->
    <div class="container-fluid bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; <a class="text-primary font-weight-bold" href="#">FitPower</a>. All Rights Reserved.</p>
        </div>
    </div>
    <!-- Footer End -->

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Inicializar AOS y Anime.js
        document.addEventListener('DOMContentLoaded', () => {
            AOS.init({ once: true });

            anime({
                targets: '.form-container',
                translateY: [-30, 0],
                opacity: [0, 1],
                duration: 1000,
                easing: 'easeOutExpo',
                delay: 200
            });
        });

        async function sendCode() {
            const email = document.getElementById("email").value;

            if(!email) {
                Swal.fire({
                    icon: "warning",
                    title: "Empty field",
                    text: "Please enter your email address.",
                    background: '#333',
                    color: '#fff',
                    confirmButtonColor: '#e53935'
                });
                return;
            }

            const response = await fetch("/recover-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    email: email
                })
            });

            const data = await response.json();

            if (data.status === "success") {
                Swal.fire({
                    icon: "success",
                    title: "Code sent",
                    text: "Check your email",
                    background: '#333',
                    color: '#fff',
                    confirmButtonColor: '#e53935'
                }).then(() => {
                    window.location.href = "/token?email=" + email;
                });
            } else {
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: data.message || "An error occurred",
                    background: '#333',
                    color: '#fff',
                    confirmButtonColor: '#e53935'
                });
            }
        }
    </script>
</body>
</html>
