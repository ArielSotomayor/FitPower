<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Recover Password</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* Estilos del cuerpo y FONDO */
        body {
            font-family: 'Inter', sans-serif;
            color: #212121;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 1. Imagen de Fondo */
            background-image: url('/static/img/about.jpg'); /* <--- CAMBIA ESTA RUTA */
            background-size: cover; /* Que cubra toda la pantalla */
            background-position: center; /* Centrar la imagen */
            background-repeat: no-repeat; /* No repetir */
            background-attachment: fixed; /* Efecto parallax suave (opcional) */
        }

        /* 2. Capa oscura sobre la imagen (Overlay) */
        /* Esto hace que el fondo no compita con el texto y se vea profesional */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* 0.6 es la opacidad (ajustable) */
            z-index: -1; /* Detrás de todo */
        }

        /* Contenedor principal (La Tarjeta) */
        .card-container {
            background-color: #ffffff;
            position: relative; /* Para asegurar que esté sobre el overlay */
            max-width: 400px;
            width: 100%;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); /* Sombra más marcada por el fondo oscuro */
            border-top: 5px solid #D32F2F;
            z-index: 1;
        }

        /* Título */
        h2 {
            text-align: center;
            color: #000000;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Inputs */
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 16px;
            color: #212121;
            box-sizing: border-box; 
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: #D32F2F; 
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); 
        }

        .form-control::placeholder {
            color: #9e9e9e;
        }

        /* Botón */
        .btn-recover {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #D32F2F;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-recover:hover {
            background-color: #B71C1C;
        }

        .btn-recover:active {
            transform: translateY(1px);
        }

    </style>
</head>

<body>

    <div class="card-container">
        <h2>Recover Password</h2>

        <input type="email" id="email" placeholder="Enter your email" class="form-control">

        <button onclick="sendCode()" class="btn-recover">
            Send Code
        </button>
    </div>

    <script>
        async function sendCode() {
            const email = document.getElementById("email").value;

            if(!email) {
                Swal.fire({
                    icon: "warning",
                    title: "Empty field",
                    text: "Please enter your email address.",
                    confirmButtonColor: '#D32F2F'
                });
                return;
            }

            const response = await fetch("/recover-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    email: email
                })
            });

            const data = await response.json();

            if (data.status === "success") {
                Swal.fire({
                    icon: "success",
                    title: "Code sent",
                    text: "Check your email",
                    confirmButtonColor: '#D32F2F'
                }).then(() => {
                    window.location.href = "/change-password?email=" + email;
                });
            } else {
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: data.message || "An error occurred",
                    confirmButtonColor: '#D32F2F'
                });
            }
        }
    </script>

</body>

</html>
