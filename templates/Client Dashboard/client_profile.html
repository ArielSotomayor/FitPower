<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>My Profile | FitPower Pro</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <div class="container-fluid p-0 nav-bar">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">

            <a href="/" class="navbar-brand">
                <h2 class="m-0 text-uppercase text-white">FitPower Pro</h2>
            </a>

            <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">

                <!-- LINKS -->
                <div class="navbar-nav ml-auto">

                    <a href="/" class="nav-item nav-link">Home</a>
                    <a href="/class" class="nav-item nav-link">Classes</a>
                    <a href="/feature" class="nav-item nav-link">Features</a>
                    <a href="/contact" class="nav-item nav-link">Contact</a>

                    <!-- USER DROPDOWN -->
                    <div class="nav-item dropdown">

                        <a class="nav-link dropdown-toggle d-flex align-items-center" data-toggle="dropdown">

                            <i class="fas fa-user-circle mr-2"></i>
                            {{ user.full_name }}

                        </a>

                        <div class="dropdown-menu dropdown-menu-right">

                            <a href="/client/profile" class="dropdown-item">
                                <i class="fas fa-user mr-2"></i> Profile
                            </a>

                            <a href="/client/settings" class="dropdown-item">
                                <i class="fas fa-cog mr-2"></i> Settings
                            </a>

                            <div class="dropdown-divider"></div>

                            <a href="/" class="dropdown-item text-danger">
                                <i class="fas fa-sign-out-alt mr-2"></i> Log Out
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </nav>
    </div>

    <!-- HEADER -->
    <div class="container-fluid bg-primary text-white text-center py-5">

        <h1 class="display-4">Welcome {{ user.full_name }} 👋</h1>
        <p>Manage your account and fitness progress</p>

    </div>

    <!-- PROFILE -->
    <div class="container mt-5">

        <div class="row">

            <!-- PHOTO -->
            <div class="col-md-4">

                <div class="card shadow text-center p-4">

                    <img src="/static/img/user.png" class="rounded-circle mx-auto" width="130">

                    <h4 class="mt-3">{{ user.full_name }}</h4>

                    <span class="badge badge-success">
                        Verified Account ✅
                    </span>

                </div>

            </div>

            <!-- INFO -->
            <div class="col-md-8">

                <div class="card shadow p-4">

                    <h4 class="mb-4">User Information</h4>

                    <div class="row">

                        <div class="col-md-6">
                            <p><strong>Name</strong></p>
                            <p>{{ user.full_name }}</p>
                        </div>

                        <div class="col-md-6">
                            <p><strong>Email</strong></p>
                            <p>{{ user.email }}</p>
                        </div>

                    </div>

                    <hr>

                    <button class="btn btn-primary">
                        <i class="fas fa-edit"></i>
                        Edit Profile
                    </button>

                    <a href="/logout" class="btn btn-danger">
                        <i class="fas fa-sign-out-alt"></i>
                        Log Out
                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const urlParams = new URLSearchParams(window.location.search);
            const success = urlParams.get("success");

            if (success === "login") {
                Swal.fire({
                    icon: "success",
                    title: "Login Successful 🎉",
                    text: "Welcome",
                    timer: 2000,
                    showConfirmButton: false
                });
            }
            window.history.replaceState({}, document.title, "/client/profile");
        });
    </script>

    
    <script src="/static/lib/easing/easing.min.js"></script>
    <script src="/static/lib/waypoints/waypoints.min.js"></script>
    <script src="/static/mail/jqBootstrapValidation.min.js"></script>
    <script src="/static/mail/contact.js"></script>

</body>

</html>
